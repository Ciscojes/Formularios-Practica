<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Registro</title>
  </head>

  <body>
    <header>
      <h1>Práctica</h1>
      <p>
        <a href="index.html">👈 Volver atrás</a>
      </p>
      <hr />
    </header>

    <main>
      <h2>Formulario estructurado</h2>

      <form action="" method="get">
        <fieldset>
          <legend>Datos Personales</legend>
          <p>
            <label for="name">Nombre</label><br />
            <input type="text" name="nombre" id="name" />
          </p>

          <p>
            <label for="lastname">Apellidos</label><br />
            <input type="text" name="apellidos" id="lastname" />
          </p>

          <p>
            <label for="dni">DNI</label><br />
            <input type="text" name="dni" id="DNI" maxlength="9" size="9" />
          </p>

          <p>
            <button>Enviar</button>
          </p>
        </fieldset>

        <fieldset>
          <legend>Datos de conexion</legend>
          <p>
            <label for="name">Nombre de usuario</label><br />
            <input type="text" name="nombre de usuario" id="name" />
          </p>
          <p>
            <label for="password1">Contraseña</label><br />
            <input type="password" name="password1" id="password1" />
          </p>
          <p>
            <label for="password2">Repite la contraseña</label><br />
            <input type="password" name="password2" id="password2" />
          </p>
        </fieldset>
      </form>
    </main>

    <hr />

    <footer>
      <p>Realizado por Jesús Granados</p>
    </footer>
  </body>
</html>
