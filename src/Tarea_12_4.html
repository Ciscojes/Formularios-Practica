<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Registro</title>
  </head>

  <body>
    <header>
      <h1>Práctica</h1>
      <p>
        <a href="index.html">👈 Volver atrás</a>
      </p>
      <hr />
    </header>

    <main>
      <h2>Informacion sobre el producto</h2>

      <form action="" method="post" enctype="multipart/form-data">
        <fieldset>
          <legend>Datos basicos</legend>

          <p>
            <label for="name">Nombre</label><br />
            <input type="text" name="nombre" id="name" />
          </p>

          <p>
            <label for="Description">Descripcion</label><br />
            <textarea
              name="descripcion"
              id="Description"
              cols="30"
              rows="10"></textarea>
          </p>

          <p>
            <label for="photo">Foto</label>
            <input type="file" name="photo" id="photo" />
          </p>

          <p>
            <input type="checkbox" name="contador" id="contador" />
            <label for="contador">Añadir contador de visitas</label>
          </p>

          <p><button>Enviar</button></p>
        </fieldset>

        <fieldset>
          <legend>Datos economicos</legend>

          <p>
            <label for="price">Precio: </label>
            <input type="number" name="precio" id="price" size="2" />

            <label for="impuestos">Impuestos</label>
            <select name="impuestos" id="impuestos">
              <option value="">-</option>
              <option value="4">4%</option>
              <option value="7">7%</option>
              <option value="16">16%</option>
              <option value="25">25%</option>
            </select>
          </p>

          <p>
            Promocion <br />
            <input type="radio" name="promo" value="" id="ninguno" checked />
            <label for="ninguno">Ninguno</label><br />

            <input type="radio" name="promo" value="gratis" id="tranport" />
            <label for="transport">Transporte gratuito</label><br />

            <input type="radio" name="promo" value="descuento" id="desc" />
            <label for="desc">Descuento 5%</label>
          </p>
        </fieldset>
      </form>
    </main>

    <hr />

    <footer>
      <p>Realizado por Jesús Granados</p>
    </footer>
  </body>
</html>
