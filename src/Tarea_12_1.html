<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Registro</title>
  </head>

  <body>
    <header>
      <h1>Práctica</h1>
      <p>
        <a href="index.html">👈 Volver atrás</a>
      </p>
      <hr />
    </header>

    <main>
      <h2>Formulario de registro</h2>

      <form action="" method="get">
        <p>
          <label for="name">Nombre:</label>
          <input type="text" name="nombre" id="name" maxlength="50" />
        </p>

        <p>
          <label for="lastname">Apellidos:</label>
          <input type="text" name="apellidos" id="lastname" maxlength="50" />
        </p>

        <p>Sexo:</p>
        <p>
          <input type="radio" name="sexo" value="h" id="man" />
          <label for="man">Hombre</label>
          <br />

          <input type="radio" name="sexo" value="m" id="woman" />
          <label for="woman">Mujer</label>
        </p>

        <p>
          <label for="email">Email: </label>
          <input type="email" name="Email" id="email" />
        </p>

        <p>
          <input type="checkbox" name="news" id="news" checked />
          <label for="news"
            >Deseo recibir informacion sobre novedades y ofertas</label
          >
        </p>

        <p>
          <input type="checkbox" name="privacy" id="privacy" required />
          <label for="privacy"
            >He leido y acepto la politica de privacidad</label
          >
        </p>

        <p>
          <label for="poblacion">Poblacion</label>
          <select name="poblacion" id="poblacion">
            <option value="">-</option>
            <option value="A">Alicante</option>
            <option value="M">Madrid</option>
            <option value="S">Sevilla</option>
            <option value="V">Valencia</option>
          </select>
        </p>

        <p>
          <label for="descripcion">Descripcion</label><br />
          <textarea
            name="descripcion"
            id="descripcion"
            cols="30"
            rows="5"
            placeholder="Escribe aqui el contenido de la consulta">
          </textarea>
        </p>

        <p>
          <button type="submit">Enviar</button>
        </p>
      </form>
    </main>

    <hr />

    <footer>
      <p>Realizado por Jesús Granados</p>
    </footer>
  </body>
</html>
